<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("images/bg.jpg") no-repeat center center;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* dark overlay */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    top:0;
    left:0;
}

.container{
    position:relative;
    z-index:1;
    background:#111;
    padding:25px;
    border-radius:15px;
    width:320px;
    text-align:center;
    color:white;
}

select, input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:gold;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

    <h2>Game Account Login</h2>

    <!-- Server select -->
    <select>
        <option>Choose Server</option>
        <option>Global</option>
        <option>KR</option>
    </select>

    <!-- Gmail -->
    <input type="email" placeholder="Enter Gmail">

    <!-- Password -->
    <input type="password" placeholder="Enter Password">

    <!-- Button -->
    <button onclick="login()">Account ထဲထည့်ရန်</button>

</div>

<script>
function login(){
    alert("Login Successful (Demo)");
}
</script>

</body>
</html>
